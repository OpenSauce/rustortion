name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libjack-jackd2-dev libasound2-dev pkg-config \
            libgl-dev libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxfixes-dev libxft-dev libxi-dev \
            libxinerama-dev libxmu-dev libxrandr-dev libxrender-dev \
            libxss-dev libxt-dev libxtst-dev libxxf86vm-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxpresent-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-dri2-0-dev
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libjack-jackd2-dev libasound2-dev pkg-config \
            libgl-dev libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxfixes-dev libxft-dev libxi-dev \
            libxinerama-dev libxmu-dev libxrandr-dev libxrender-dev \
            libxss-dev libxt-dev libxtst-dev libxxf86vm-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxpresent-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-dri2-0-dev
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: make test
